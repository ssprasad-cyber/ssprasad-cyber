<svg fill="none" viewBox="0 0 900 180" width="900" height="180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:opsz,wght@9..40,200;9..40,300&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .root {
          width: 900px;
          height: 180px;
          background: #080808;
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 1px;
          font-family: 'DM Mono', monospace;
          overflow: hidden;
        }

        .proj {
          background: #0a0a0a;
          padding: 28px 30px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          border-right: 1px solid #111111;
          position: relative;
          overflow: hidden;
          transition: background 0.4s;
        }

        .proj:last-child { border-right: none; }
        .proj:hover { background: #0d0d0d; }

        .proj::after {
          content: '';
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 1px;
          background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
        }

        .proj-num {
          font-size: 9px;
          letter-spacing: 0.22em;
          color: #1e1e1e;
          text-transform: uppercase;
        }

        .proj-name {
          font-family: 'DM Sans', sans-serif;
          font-weight: 200;
          font-size: 22px;
          color: #444444;
          letter-spacing: -0.01em;
          line-height: 1;
        }

        .proj-bottom {
          display: flex;
          justify-content: space-between;
          align-items: flex-end;
        }

        .proj-desc {
          font-size: 10px;
          font-weight: 300;
          color: #252525;
          letter-spacing: 0.08em;
          line-height: 1.6;
        }

        .proj-tag {
          font-size: 9px;
          letter-spacing: 0.18em;
          color: #1c1c1c;
          text-transform: uppercase;
          border: 1px solid #181818;
          padding: 4px 8px;
          border-radius: 2px;
          white-space: nowrap;
          align-self: flex-start;
        }
      </style>

      <div class="root">

        <div class="proj">
          <div class="proj-num">01 / ANDROID</div>
          <div class="proj-name">DumbLauncher</div>
          <div class="proj-bottom">
            <div class="proj-desc">Smartphone → focus device<br/>toggle smart mode on demand</div>
            <div class="proj-tag">Kotlin</div>
          </div>
        </div>

        <div class="proj">
          <div class="proj-num">02 / WEB · 3D</div>
          <div class="proj-name">Spider-Bot</div>
          <div class="proj-bottom">
            <div class="proj-desc">Quadruped robot showcase<br/>interactive 3D · cyberpunk</div>
            <div class="proj-tag">Three.js</div>
          </div>
        </div>

        <div class="proj">
          <div class="proj-num">03 / TOOL</div>
          <div class="proj-name">REGAIN</div>
          <div class="proj-bottom">
            <div class="proj-desc">Behavioral productivity tracker<br/>single-file · zero deps</div>
            <div class="proj-tag">Vanilla</div>
          </div>
        </div>

      </div>
    </div>
  </foreignObject>
</svg>
