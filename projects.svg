<svg fill="none" viewBox="0 0 900 180" width="900" height="180" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        .root {
          width:900px; height:180px; background:#060606;
          display:grid; grid-template-columns:repeat(3,1fr);
          font-family: ui-monospace,'Cascadia Code','Source Code Pro',Menlo,Consolas,monospace;
          border-top: 1px solid #111;
        }
        .proj {
          padding: 28px 32px;
          display:flex; flex-direction:column; justify-content:space-between;
          border-right: 1px solid #111;
        }
        .proj:last-child { border-right:none; }
        .pn  { font-size:9px; letter-spacing:.22em; color:#1c1c1c; text-transform:uppercase; }
        .pt  {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          font-weight:200; font-size:24px; color:#3a3a3a; letter-spacing:-.01em;
        }
        .pb  { display:flex; justify-content:space-between; align-items:flex-end; }
        .pd  { font-size:10px; color:#202020; letter-spacing:.07em; line-height:1.7; }
        .pk  { font-size:9px; letter-spacing:.18em; color:#1a1a1a; text-transform:uppercase; border:1px solid #161616; padding:4px 9px; border-radius:2px; white-space:nowrap; }
      </style>
      <div class="root">
        <div class="proj">
          <div class="pn">01 / Android</div>
          <div class="pt">DumbLauncher</div>
          <div class="pb">
            <div class="pd">Smartphone → focus device<br/>toggle smart mode on demand</div>
            <div class="pk">Kotlin</div>
          </div>
        </div>
        <div class="proj">
          <div class="pn">02 / Web · 3D</div>
          <div class="pt">Spider-Bot</div>
          <div class="pb">
            <div class="pd">Quadruped robot showcase<br/>interactive 3D · cyberpunk</div>
            <div class="pk">Three.js</div>
          </div>
        </div>
        <div class="proj">
          <div class="pn">03 / Tool</div>
          <div class="pt">REGAIN</div>
          <div class="pb">
            <div class="pd">Behavioral tracker<br/>single-file · zero deps</div>
            <div class="pk">Vanilla</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
