<svg fill="none" viewBox="0 0 900 110" width="900" height="110" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        .root {
          width:900px; height:110px; background:#080808;
          border-top:1px solid #0f0f0f;
          display:grid; grid-template-columns:repeat(4,1fr);
          font-family: ui-monospace,'Cascadia Code','Source Code Pro',Menlo,Consolas,monospace;
        }
        .cell {
          display:flex; flex-direction:column; justify-content:center;
          align-items:center; gap:10px;
          border-right:1px solid #0f0f0f;
          padding:0 24px;
        }
        .cell:last-child { border-right:none; }
        .bar-track {
          width:100%; height:2px; background:#111; border-radius:2px; overflow:hidden;
        }
        .bar-fill {
          height:100%; background:#202020; border-radius:2px;
          animation: grow 1.4s ease forwards;
          width:0;
        }
        @keyframes grow { to { width: var(--w); } }
        .label { font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:#1e1e1e; }
        .val   { font-size:22px; font-weight:100;
                 font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
                 color:#303030; letter-spacing:-.02em; }
        .sub   { font-size:9px; letter-spacing:.12em; color:#1a1a1a; }
      </style>
      <div class="root">
        <div class="cell">
          <div class="label">Projects</div>
          <div class="val">3</div>
          <div class="bar-track"><div class="bar-fill" style="--w:55%"></div></div>
        </div>
        <div class="cell">
          <div class="label">Primary</div>
          <div class="val">Kotlin</div>
          <div class="bar-track"><div class="bar-fill" style="--w:70%;animation-delay:.2s"></div></div>
        </div>
        <div class="cell">
          <div class="label">Stack depth</div>
          <div class="val">6+</div>
          <div class="bar-track"><div class="bar-fill" style="--w:60%;animation-delay:.4s"></div></div>
        </div>
        <div class="cell">
          <div class="label">Open to work</div>
          <div class="val">Yes</div>
          <div class="bar-track"><div class="bar-fill" style="--w:100%;animation-delay:.6s"></div></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
