<svg fill="none" viewBox="0 0 900 420" width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .root {
          width: 900px; height: 420px; background: #080808;
          font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
          position: relative; overflow: hidden;
          display: grid; grid-template-columns: 1fr 1fr;
        }
        .gl { position: absolute; background: #fff; opacity: 0; animation: fg 8s ease-in-out infinite; }
        .gl.v { width: 1px; height: 100%; top: 0; }
        .gl.h { height: 1px; width: 100%; left: 0; }
        .gl:nth-child(1) { left: 25%; animation-delay: 0s; }
        .gl:nth-child(2) { left: 50%; animation-delay: 1.2s; }
        .gl:nth-child(3) { left: 75%; animation-delay: 2.4s; }
        .gl:nth-child(4) { top: 33%;  animation-delay: 0.6s; }
        .gl:nth-child(5) { top: 66%;  animation-delay: 1.8s; }
        @keyframes fg { 0%,100%{opacity:0} 50%{opacity:.05} }
        .dot { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #fff; opacity: .1; }
        .left {
          position: relative; z-index: 1;
          padding: 52px 44px 48px 52px;
          display: flex; flex-direction: column; justify-content: space-between;
          border-right: 1px solid #161616;
        }
        .tag { font-size: 10px; letter-spacing: .22em; color: #2e2e2e; text-transform: uppercase; animation: up .8s ease both; }
        .nb { flex:1; display:flex; flex-direction:column; justify-content:center; animation: up .9s .15s ease both; }
        .n1 {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          font-weight: 100; font-size: 76px; line-height: 1; letter-spacing: -.03em; color: #e0e0e0;
        }
        .n2 {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          font-weight: 100; font-size: 76px; line-height: 1; letter-spacing: -.03em; color: #1e1e1e;
        }
        .role { font-size: 11px; color: #2a2a2a; letter-spacing: .16em; animation: up 1s .3s ease both; }
        @keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .right {
          position: relative; z-index: 1;
          padding: 52px 52px 48px 44px;
          display: flex; flex-direction: column; justify-content: space-between;
        }
        .bento { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; animation: up 1s .45s ease both; }
        .card {
          background: #0c0c0c; border: 1px solid #181818; border-radius: 6px;
          padding: 18px 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .card.wide { grid-column: 1 / -1; }
        .cl { font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: #252525; }
        .cv { font-size: 12px; color: #505050; line-height: 1.55; }
        .pr { display:flex; align-items:center; gap:9px; }
        .p {
          width: 6px; height: 6px; border-radius: 50%; background: #232323;
          position: relative; flex-shrink: 0;
        }
        .p::after {
          content:''; position:absolute; inset:-3px; border-radius:50%;
          background:#232323; animation: rp 2.5s ease-out infinite;
        }
        @keyframes rp { 0%{transform:scale(.8);opacity:.5} 100%{transform:scale(2.5);opacity:0} }
        .bot { display:flex; align-items:center; justify-content:space-between; animation: up 1s .6s ease both; }
        .lnk { font-size: 10px; letter-spacing: .16em; color: #222; text-transform: uppercase; }
        .yr  { font-size: 10px; color: #161616; letter-spacing: .1em; }
        .cur {
          display:inline-block; width:2px; height:.75em;
          background:#282828; margin-left:3px; vertical-align:middle;
          animation: bl 1.1s step-end infinite;
        }
        @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0} }
      </style>
      <div class="root">
        <div style="position:absolute;inset:0;z-index:0">
          <div class="gl v"></div><div class="gl v"></div><div class="gl v"></div>
          <div class="gl h"></div><div class="gl h"></div>
        </div>
        <div class="dot" style="top:24px;left:24px"></div>
        <div class="dot" style="top:24px;right:24px"></div>
        <div class="dot" style="bottom:24px;left:24px"></div>
        <div class="dot" style="bottom:24px;right:24px"></div>

        <div class="left">
          <div class="tag">s-saiprasad &nbsp;·&nbsp; in</div>
          <div class="nb">
            <div class="n1">Sai</div>
            <div class="n2">Prasad<span class="cur"></span></div>
          </div>
          <div class="role">Engineer &nbsp;/&nbsp; Builder &nbsp;/&nbsp; Thinker</div>
        </div>

        <div class="right">
          <div class="bento">
            <div class="card">
              <div class="cl">Currently</div>
              <div class="pr"><div class="p"></div><div class="cv">B.Tech Final Year</div></div>
            </div>
            <div class="card">
              <div class="cl">Mode</div>
              <div class="cv">Building.<br/>Not talking.</div>
            </div>
            <div class="card wide">
              <div class="cl">Active Projects</div>
              <div class="cv">DumbLauncher &nbsp;·&nbsp; Spider-Bot 3D &nbsp;·&nbsp; REGAIN</div>
            </div>
            <div class="card">
              <div class="cl">Stack</div>
              <div class="cv">Kotlin · JS<br/>Three.js · Android</div>
            </div>
            <div class="card">
              <div class="cl">Based in</div>
              <div class="cv">Andhra Pradesh<br/>India</div>
            </div>
          </div>
          <div class="bot">
            <div style="display:flex;gap:20px">
              <span class="lnk">LinkedIn</span>
              <span class="lnk">GitHub</span>
            </div>
            <div class="yr">2026</div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
