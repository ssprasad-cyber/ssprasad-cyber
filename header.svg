<svg fill="none" viewBox="0 0 900 420" width="900" height="420" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .root {
          width: 900px;
          height: 420px;
          background: #080808;
          font-family: 'DM Mono', monospace;
          position: relative;
          overflow: hidden;
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        /* ── noise grain overlay ── */
        .root::before {
          content: '';
          position: absolute;
          inset: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
          opacity: 0.03;
          z-index: 0;
          pointer-events: none;
        }

        /* ── animated grid lines ── */
        .grid-lines {
          position: absolute;
          inset: 0;
          z-index: 0;
          pointer-events: none;
        }
        .gl {
          position: absolute;
          background: #ffffff;
          opacity: 0;
          animation: fadeGrid 8s ease-in-out infinite;
        }
        .gl.v { width: 1px; height: 100%; top: 0; }
        .gl.h { height: 1px; width: 100%; left: 0; }
        .gl:nth-child(1) { left: 25%;  animation-delay: 0s; }
        .gl:nth-child(2) { left: 50%;  animation-delay: 1.2s; }
        .gl:nth-child(3) { left: 75%;  animation-delay: 2.4s; }
        .gl:nth-child(4) { top: 33%;   animation-delay: 0.6s; }
        .gl:nth-child(5) { top: 66%;   animation-delay: 1.8s; }

        @keyframes fadeGrid {
          0%, 100% { opacity: 0; }
          50%       { opacity: 0.04; }
        }

        /* ── corner dot ── */
        .dot {
          position: absolute;
          width: 3px;
          height: 3px;
          border-radius: 50%;
          background: #ffffff;
          opacity: 0.15;
        }
        .dot:nth-child(1) { top: 24px; left: 24px; }
        .dot:nth-child(2) { top: 24px; right: 24px; }
        .dot:nth-child(3) { bottom: 24px; left: 24px; }
        .dot:nth-child(4) { bottom: 24px; right: 24px; }

        /* ── left panel ── */
        .left {
          position: relative;
          z-index: 1;
          padding: 52px 44px 48px 52px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          border-right: 1px solid #1a1a1a;
        }

        .tag {
          font-family: 'DM Mono', monospace;
          font-size: 10px;
          font-weight: 400;
          letter-spacing: 0.22em;
          color: #3a3a3a;
          text-transform: uppercase;
          animation: slideUp 0.8s ease forwards;
          opacity: 0;
        }

        .name-block {
          flex: 1;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 2px;
          animation: slideUp 0.9s 0.15s ease forwards;
          opacity: 0;
        }

        .name-first {
          font-family: 'DM Sans', sans-serif;
          font-weight: 200;
          font-size: 68px;
          line-height: 1;
          letter-spacing: -0.02em;
          color: #ffffff;
        }

        .name-last {
          font-family: 'DM Sans', sans-serif;
          font-weight: 200;
          font-size: 68px;
          line-height: 1;
          letter-spacing: -0.02em;
          color: #2c2c2c;
        }

        .role {
          font-family: 'DM Mono', monospace;
          font-size: 11px;
          font-weight: 300;
          color: #404040;
          letter-spacing: 0.12em;
          animation: slideUp 1s 0.3s ease forwards;
          opacity: 0;
        }

        @keyframes slideUp {
          from { opacity: 0; transform: translateY(14px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ── right panel ── */
        .right {
          position: relative;
          z-index: 1;
          padding: 52px 52px 48px 44px;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          gap: 0;
        }

        /* ── bento grid ── */
        .bento {
          display: grid;
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto auto;
          gap: 10px;
          animation: slideUp 1s 0.45s ease forwards;
          opacity: 0;
        }

        .card {
          background: #0e0e0e;
          border: 1px solid #1c1c1c;
          border-radius: 6px;
          padding: 16px 18px;
          display: flex;
          flex-direction: column;
          gap: 8px;
          transition: border-color 0.3s ease;
        }

        .card:hover { border-color: #2a2a2a; }

        .card-label {
          font-family: 'DM Mono', monospace;
          font-size: 9px;
          font-weight: 400;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #2e2e2e;
        }

        .card-value {
          font-family: 'DM Sans', sans-serif;
          font-weight: 300;
          font-size: 13px;
          color: #888888;
          line-height: 1.5;
        }

        .card.wide {
          grid-column: 1 / -1;
        }

        .card.accent {
          background: #0e0e0e;
          border-color: #1e1e1e;
        }

        .card.accent .card-value {
          color: #555555;
        }

        /* ── status dot ── */
        .status-row {
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .pulse {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #2a2a2a;
          position: relative;
          flex-shrink: 0;
        }

        .pulse::after {
          content: '';
          position: absolute;
          inset: -3px;
          border-radius: 50%;
          background: #2a2a2a;
          animation: ripple 2.5s ease-out infinite;
        }

        @keyframes ripple {
          0%   { transform: scale(0.8); opacity: 0.6; }
          100% { transform: scale(2.2); opacity: 0; }
        }

        /* ── bottom bar ── */
        .bottom-bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          animation: slideUp 1s 0.6s ease forwards;
          opacity: 0;
        }

        .links {
          display: flex;
          gap: 20px;
        }

        .link-item {
          font-family: 'DM Mono', monospace;
          font-size: 10px;
          font-weight: 400;
          letter-spacing: 0.14em;
          color: #2a2a2a;
          text-decoration: none;
          text-transform: uppercase;
          transition: color 0.2s;
        }

        .link-item:hover { color: #555555; }

        .yr {
          font-family: 'DM Mono', monospace;
          font-size: 10px;
          color: #1e1e1e;
          letter-spacing: 0.1em;
        }

        /* ── cursor blink ── */
        .cursor {
          display: inline-block;
          width: 2px;
          height: 0.8em;
          background: #2a2a2a;
          margin-left: 4px;
          vertical-align: middle;
          animation: blink 1.1s step-end infinite;
        }

        @keyframes blink {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0; }
        }
      </style>

      <div class="root">

        <!-- grid lines -->
        <div class="grid-lines">
          <div class="gl v"></div>
          <div class="gl v"></div>
          <div class="gl v"></div>
          <div class="gl h"></div>
          <div class="gl h"></div>
        </div>

        <!-- corner dots -->
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>

        <!-- LEFT -->
        <div class="left">
          <div class="tag">S-SAIPRASAD · IN</div>

          <div class="name-block">
            <div class="name-first">Sai</div>
            <div class="name-last">Prasad<span class="cursor"></span></div>
          </div>

          <div class="role">Engineer &nbsp;/&nbsp; Builder &nbsp;/&nbsp; Thinker</div>
        </div>

        <!-- RIGHT -->
        <div class="right">

          <div class="bento">
            <div class="card">
              <div class="card-label">Currently</div>
              <div class="status-row">
                <div class="pulse"></div>
                <div class="card-value">B.Tech Final Year</div>
              </div>
            </div>

            <div class="card">
              <div class="card-label">Mode</div>
              <div class="card-value">Building.<br/>Not talking.</div>
            </div>

            <div class="card accent wide">
              <div class="card-label">Projects</div>
              <div class="card-value">DumbLauncher · Spider-Bot 3D · REGAIN</div>
            </div>

            <div class="card">
              <div class="card-label">Stack</div>
              <div class="card-value">Kotlin · JS<br/>Three.js · Android</div>
            </div>

            <div class="card">
              <div class="card-label">Based in</div>
              <div class="card-value">Andhra Pradesh<br/>India</div>
            </div>
          </div>

          <div class="bottom-bar">
            <div class="links">
              <span class="link-item">LinkedIn</span>
              <span class="link-item">GitHub</span>
            </div>
            <div class="yr">© 2026</div>
          </div>

        </div>
      </div>
    </div>
  </foreignObject>
</svg>
