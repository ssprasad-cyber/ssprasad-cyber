<svg fill="none" viewBox="0 0 900 88" width="900" height="88" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        .root {
          width:900px; height:88px; background:#050505;
          border-top:1px solid #0f0f0f;
          display:flex; align-items:center; justify-content:space-between;
          padding:0 52px;
          font-family: ui-monospace,'Cascadia Code','Source Code Pro',Menlo,Consolas,monospace;
        }
        .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
        .il { font-size:8px; letter-spacing:.25em; text-transform:uppercase; color:#1a1a1a; }
        .iv { font-size:11px; letter-spacing:.1em; color:#2a2a2a; }
        .sep { width:1px; height:28px; background:#0f0f0f; }
        .chips { display:flex; gap:10px; align-items:center; }
        .chip { font-size:9px; letter-spacing:.15em; color:#1e1e1e; text-transform:uppercase; padding:4px 10px; border:1px solid #131313; border-radius:2px; }
      </style>
      <div class="root">
        <div class="item">
          <div class="il">Location</div>
          <div class="iv">Andhra Pradesh, IN</div>
        </div>
        <div class="sep"></div>
        <div class="item">
          <div class="il">Focus</div>
          <div class="iv">Android · Web · Systems</div>
        </div>
        <div class="sep"></div>
        <div class="item">
          <div class="il">Stack</div>
          <div class="chips">
            <div class="chip">Kotlin</div>
            <div class="chip">JS</div>
            <div class="chip">Three.js</div>
            <div class="chip">Python</div>
            <div class="chip">Git</div>
          </div>
        </div>
        <div class="sep"></div>
        <div class="item">
          <div class="il">Status</div>
          <div class="iv">Open to work</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
