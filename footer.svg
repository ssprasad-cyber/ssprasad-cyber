<svg fill="none" viewBox="0 0 900 90" width="900" height="90" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .root {
          width: 900px;
          height: 90px;
          background: #060606;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 52px;
          border-top: 1px solid #111111;
          font-family: 'DM Mono', monospace;
          gap: 0;
        }

        .item {
          display: flex;
          flex-direction: column;
          gap: 6px;
          align-items: center;
        }

        .item-label {
          font-size: 8px;
          letter-spacing: 0.25em;
          text-transform: uppercase;
          color: #1c1c1c;
        }

        .item-value {
          font-size: 11px;
          font-weight: 300;
          letter-spacing: 0.1em;
          color: #2e2e2e;
        }

        .sep {
          width: 1px;
          height: 28px;
          background: #111111;
        }

        .stack-row {
          display: flex;
          gap: 18px;
          align-items: center;
        }

        .chip {
          font-size: 9px;
          letter-spacing: 0.15em;
          color: #222222;
          text-transform: uppercase;
          padding: 4px 10px;
          border: 1px solid #141414;
          border-radius: 2px;
        }
      </style>

      <div class="root">
        <div class="item">
          <div class="item-label">Location</div>
          <div class="item-value">Andhra Pradesh, IN</div>
        </div>

        <div class="sep"></div>

        <div class="item">
          <div class="item-label">Focus</div>
          <div class="item-value">Android · Web · Systems</div>
        </div>

        <div class="sep"></div>

        <div class="item">
          <div class="item-label">Stack</div>
          <div class="stack-row">
            <div class="chip">Kotlin</div>
            <div class="chip">JS</div>
            <div class="chip">Three.js</div>
            <div class="chip">Python</div>
            <div class="chip">Git</div>
          </div>
        </div>

        <div class="sep"></div>

        <div class="item">
          <div class="item-label">Status</div>
          <div class="item-value">Open to work</div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
